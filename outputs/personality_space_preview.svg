<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="40" y="44" class="title">Character Physics Preview: Lin Fan</text>
  <text x="40" y="68" class="small">2D projection: x = trust, y = fear. Repeated abandonment-like events pull the personality core.</text>

  <line x1="80" y1="560" x2="840" y2="560" class="axis" />
  <line x1="80" y1="560" x2="80" y2="80" class="axis" />
  <text x="420.0" y="612" class="label">trust →</text>
  <text x="24" y="320.0" class="label" transform="rotate(-90 24,320.0)">fear →</text>

  <line x1="80" y1="80" x2="840" y2="80" class="grid" />
  <line x1="840" y1="80" x2="840" y2="560" class="grid" />
  <text x="70" y="584" class="small">0</text>
  <text x="832" y="584" class="small">1</text>
  <text x="52" y="84" class="small">1</text>

  <circle cx="391.6" cy="281.6" r="63.4" fill="#fee2e2" stroke="#dc2626" stroke-width="3" opacity="0.75" />
  <text x="463.0" y="281.6" class="label">abandonment cluster</text>
  <text x="463.0" y="299.6" class="small">mass=2.464, stability=0.7392, age=3</text>

  <circle cx="277.6" cy="166.4" r="10" fill="#2563eb" stroke="#1e3a8a" stroke-width="3" />
  <text x="291.6" y="171.4" class="label">initial personality core</text>

  <line x1="277.6" y1="166.4" x2="277.4" y2="166.3" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" /><line x1="277.4" y1="166.3" x2="276.4" y2="165.7" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" /><line x1="276.4" y1="165.7" x2="272.6" y2="163.6" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <circle cx="277.4" cy="166.3" r="7" fill="#f97316" stroke="#9a3412" stroke-width="2" /><text x="287.4" y="156.3" class="small">Memory 1</text><circle cx="276.4" cy="165.7" r="7" fill="#f97316" stroke="#9a3412" stroke-width="2" /><text x="286.4" y="155.7" class="small">Memory 2</text><circle cx="272.6" cy="163.6" r="7" fill="#f97316" stroke="#9a3412" stroke-width="2" /><text x="282.6" y="153.6" class="small">Memory 3</text>

  <circle cx="272.6" cy="163.6" r="11" fill="#16a34a" stroke="#166534" stroke-width="3" />
  <text x="286.6" y="168.6" class="label">after repeated events</text>

  <rect x="620" y="440" width="240" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1" />
