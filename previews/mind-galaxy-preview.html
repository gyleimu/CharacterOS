<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Galaxy Preview — CharacterOS V10.49</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080810; color: #ccc; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; user-select: none; }
  header { padding: 10px 0 0; text-align: center; opacity: 0.5; }
  header h1 { font-size: 13px; font-weight: 400; letter-spacing: 2px; }
  #hud { display: flex; gap: 10px; align-items: center; padding: 6px 0 0; font-family: monospace; font-size: 11px; color: #666; flex-wrap: wrap; justify-content: center; }
  #hud span { color: #999; }
  #hud .level { color: #FFD700; font-weight: bold; }
  #hud .anim { color: #7ec87e; }
  #hud .paused { color: #c87e7e; }
  #hud .reduced { color: #7e9ec8; }
  #hud .ok { color: #7ec87e; }
  #hud .warn { color: #c8a87e; }
  #controls { display: flex; gap: 4px; padding: 2px 0 4px; flex-wrap: wrap; justify-content: center; }
  #controls button { background: #1a1a2e; color: #777; border: 1px solid #333; padding: 2px 10px; font-size: 10px; cursor: pointer; border-radius: 2px; font-family: monospace; }
  #controls button:hover { background: #222240; color: #aaa; }
  #controls button.active { background: #2a2a4e; color: #ccc; border-color: #555; }
  #debug-toggle { position: fixed; right: 12px; top: 12px; z-index: 10; background: #151526; color: #888; border: 1px solid #333; padding: 4px 10px; font: 10px monospace; cursor: pointer; border-radius: 3px; }
  #debug-panel { position: fixed; right: 12px; top: 42px; width: 260px; max-height: calc(100vh - 54px); overflow: auto; z-index: 10; background: rgba(10,10,18,0.92); border: 1px solid #2c2c44; color: #888; padding: 8px; font: 10px monospace; border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
  #debug-panel.collapsed { display: none; }
  #debug-panel h2 { font-size: 10px; color: #aaa; margin-bottom: 6px; font-weight: 500; letter-spacing: 1px; }
  #debug-panel .row { display: flex; justify-content: space-between; gap: 8px; padding: 1px 0; }
  #debug-panel .label { color: #555; }
  #debug-panel .value { color: #aaa; text-align: right; }
  #debug-panel .group { display: flex; gap: 4px; flex-wrap: wrap; margin: 7px 0; }
  #debug-panel button { background: #1a1a2e; color: #777; border: 1px solid #333; padding: 2px 6px; font-size: 10px; cursor: pointer; border-radius: 2px; font-family: monospace; }
  #debug-panel button:hover { background: #222240; color: #aaa; }
  #debug-snapshot { width: 100%; min-height: 86px; resize: vertical; background: #080810; color: #999; border: 1px solid #292940; padding: 6px; font: 10px monospace; }
  #canvas { display: block; cursor: grab; }
  #canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<header><h1>CHARACTEROS MIND GALAXY</h1></header>
<div id="hud">
  scale <span id="hud-scale">1.00</span> &middot;
  <span class="level" id="hud-level">L1</span> &middot;
  <span class="anim" id="hud-anim">running</span> &middot;
  <span id="hud-motion">motion:normal</span> &middot;
  <span id="hud-nodes">0 nodes</span> ·
  <span id="hud-src">fixture</span> ·
  <span id="hud-data">real:loading</span> ·
  <span id="hud-drift">drift:—</span>
</div>
<div id="controls">
  <button data-scale="0.5">L0</button>
  <button data-scale="1.125">L1</button>
  <button data-scale="2.25">L2</button>
  <button data-scale="4.0">L3</button>
  <button data-scale="6.5">L4</button>
  <button id="btn-pause">Pause</button>
  <button id="btn-motion">Motion</button>
  <button id="btn-drift">Drift:subtle</button>
  <button id="btn-source">Real</button>
  <button data-scale="0.5" style="margin-left:4px">Reset</button>
</div>
<canvas id="canvas"></canvas>
<button id="debug-toggle">Debug</button>
<aside id="debug-panel" class="collapsed" aria-label="Mind Galaxy debug instrument controls">
  <h2>DEBUG INSTRUMENT</h2>
  <div class="row"><span class="label">scale</span><span class="value" id="dbg-scale">0.50</span></div>
  <div class="row"><span class="label">level</span><span class="value" id="dbg-level">L0</span></div>
  <div class="row"><span class="label">source</span><span class="value" id="dbg-source">fixture</span></div>
  <div class="row"><span class="label">motion</span><span class="value" id="dbg-motion">normal</span></div>
  <div class="row"><span class="label">drift</span><span class="value" id="dbg-drift">subtle</span></div>
  <div class="row"><span class="label">timeMs</span><span class="value" id="dbg-time">0</span></div>
  <div class="row"><span class="label">visible nodes</span><span class="value" id="dbg-visible-nodes">0</span></div>
  <div class="row"><span class="label">visible edges</span><span class="value" id="dbg-visible-edges">0</span></div>
  <div class="row"><span class="label">real data</span><span class="value" id="dbg-real">loading</span></div>
  <div class="group">
    <button id="btn-freeze-time">Freeze Time</button>
    <button id="btn-step-1s">Step +1s</button>
    <button id="btn-step-10s">Step +10s</button>
    <button id="btn-reset-time">Reset Time</button>
  </div>
  <div class="group">
    <button id="preset-outer">Outer Nebula</button>
    <button id="preset-memory">Memory Field</button>
    <button id="preset-drift">Drift Inspect</button>
  </div>
  <div class="group">
    <button id="btn-copy-summary">Copy Snapshot Summary</button>
  </div>
  <textarea id="debug-snapshot" readonly aria-label="Snapshot summary"></textarea>
</aside>
<script src="mind-galaxy-preview.js"></script>
</body>
</html>
